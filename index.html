<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Elinor — Research for impact-focused wealth managers</title>
    <meta
      name="description"
      content="Elinor researches how impact-focused wealth managers can reimagine the way they collect, allocate, and evaluate capital — for better returns to investors and society."
    />
    <meta name="theme-color" content="#2f5233" />
    <meta name="author" content="Elinor" />

    <!-- Canonical -->
    <link rel="canonical" href="https://elinorai.com/" />

    <!-- Favicon -->
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://elinorai.com/" />
    <meta
      property="og:title"
      content="Elinor — Research for impact-focused wealth managers"
    />
    <meta
      property="og:description"
      content="Elinor researches how impact-focused wealth managers can reimagine the way they collect, allocate, and evaluate capital — for better returns to investors and society."
    />
    <meta property="og:site_name" content="Elinor" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Elinor",
        "url": "https://elinorai.com",
        "logo": "https://elinorai.com/favicon.svg",
        "description": "Elinor is a research initiative working with impact-focused wealth managers to reimagine how capital is collected, allocated, and evaluated — for better returns to investors and society."
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Elinor",
        "url": "https://elinorai.com"
      }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Libre+Baskerville:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preload" as="image" href="hero-bg.jpg" />
  </head>
  <body>
    <!-- Shared SVG symbols -->
    <svg style="display: none" aria-hidden="true">
      <symbol id="logo-tree" viewBox="0 0 20 24">
        <line
          x1="10"
          y1="24"
          x2="10"
          y2="8"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
        />
        <path
          d="M10 16 L4 12"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
        />
        <path
          d="M10 16 L16 12"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
        />
        <path
          d="M10 11 L5 7"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
        />
        <path
          d="M10 11 L15 7"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
        />
        <circle cx="10" cy="5" r="2" fill="currentColor" />
      </symbol>
    </svg>

    <main>
      <section class="hero">
        <div class="hero-logo">
          <svg width="20" height="24" aria-hidden="true">
            <use href="#logo-tree" />
          </svg>
          Elinor
        </div>
        <div class="container">
          <div class="hero-content reveal">
            <h1>Better returns. For investors, and for society.</h1>
            <p class="hero-subtitle">
              The team at Elinor researches how impact-focused wealth managers
              can reimagine the way they attract, allocate and evaluate
              capital.
            </p>
            <form class="hero-form" id="contact-form" novalidate>
              <div class="hero-form-fields" id="form-fields" hidden>
                <label class="sr-only" for="contact-email">Email</label>
                <input
                  type="email"
                  id="contact-email"
                  name="email"
                  placeholder="Your email"
                  autocomplete="email"
                  required
                />
                <label class="sr-only" for="contact-message">Message</label>
                <textarea
                  id="contact-message"
                  name="message"
                  rows="3"
                  placeholder="Tell us about yourself and your interest"
                ></textarea>
              </div>
              <button class="btn btn-primary" type="submit" id="form-submit">
                Find out more
              </button>
              <p id="form-status" class="form-status" hidden></p>
            </form>
            <div class="hero-shoulder">
              <span class="shoulder-label">Supported by</span>
              <a
                class="shoulder-logo"
                href="https://www.antler.co/"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Antler"
              >
                <img
                  src="antler-logo.svg"
                  alt="Antler"
                  width="78"
                  height="19"
                />
              </a>
              <a
                class="shoulder-logo"
                href="https://generate.lse.ac.uk/"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="LSE Generate"
              >
                <img
                  src="lse-generate-logo.jpg"
                  alt="LSE Generate"
                  height="28"
                />
              </a>
            </div>
          </div>
        </div>
        <span class="photo-credit"
          >Photo by <a href="https://unsplash.com/@heySU">Sebastian Unrau</a> on
          <a href="https://unsplash.com">Unsplash</a></span
        >
      </section>
    </main>
    <script>
      const FORM_ENDPOINT =
        "https://script.google.com/macros/s/AKfycbyJAu5RkTTEr1Jwlc9wNf4P5gZHY8EaPlyAUlneUPVHoqaz6zfoV4x1QCpZh7vtzudp/exec";
      const form = document.getElementById("contact-form");
      const fields = document.getElementById("form-fields");
      const status = document.getElementById("form-status");
      const submit = document.getElementById("form-submit");
      let formOpen = false;

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        if (!formOpen) {
          formOpen = true;
          fields.hidden = false;
          submit.textContent = "Send";
          form.classList.add("hero-form--open");
          // give the field a moment to render, then focus
          requestAnimationFrame(() => form.elements.email.focus());
          return;
        }

        const email = form.elements.email.value.trim();
        if (!email || !email.includes("@")) {
          status.textContent = "Please enter a valid email address.";
          status.className = "form-status form-status-error";
          status.hidden = false;
          return;
        }

        submit.disabled = true;
        submit.textContent = "Sending…";
        status.hidden = true;
        status.className = "form-status";

        try {
          const params = new URLSearchParams();
          new FormData(form).forEach((v, k) => params.append(k, v));
          await fetch(FORM_ENDPOINT, {
            method: "POST",
            mode: "no-cors",
            body: params,
          });
          status.textContent = "Thanks — we'll be in touch.";
          status.className = "form-status form-status-success";
          status.hidden = false;
          form.reset();
        } catch (err) {
          status.textContent =
            "Something went wrong. Please email tao.platt@elinorai.com directly.";
          status.className = "form-status form-status-error";
          status.hidden = false;
        } finally {
          submit.disabled = false;
          submit.textContent = "Send";
        }
      });
    </script>
  </body>
</html>
